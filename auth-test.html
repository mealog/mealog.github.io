<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Firebase Google 로그인 테스트</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 16px;
        background: #0f172a;
        color: #e2e8f0;
        line-height: 1.5;
      }
      button {
        margin: 4px 8px 4px 0;
        padding: 8px 14px;
        cursor: pointer;
        border-radius: 6px;
        border: 1px solid #475569;
        background: #1e293b;
        color: #f1f5f9;
      }
      button:hover {
        background: #334155;
      }
      #log {
        margin-top: 16px;
        white-space: pre-wrap;
        font-size: 12px;
        max-height: 65vh;
        overflow: auto;
        border: 1px solid #334155;
        padding: 12px;
        border-radius: 8px;
        background: #020617;
        font-family: ui-monospace, monospace;
      }
      .warn {
        color: #fbbf24;
      }
    </style>
  </head>
  <body>
    <h1>Firebase Google 로그인 테스트</h1>
    <p>
      메인 앱과 <strong>같은 .env</strong>의 <code>VITE_FIREBASE_*</code>를 씁니다. 페이지를 연 직후에는 당연히
      <code>currentUser: null</code> 입니다. 반드시 <strong>팝업</strong> 또는 <strong>리다이렉트</strong> 버튼을 누른 뒤에 나오는
      줄까지 복사해 주세요.
    </p>
    <p class="warn">
      로컬: <code>npm run dev</code> 후 이 파일 URL로 접속 (예: <code>/auth-test.html</code>, 저장소가 프로젝트 페이지면
      <code>/저장소이름/auth-test.html</code>). 배포본도 동일 규칙.
    </p>
    <div>
      <button type="button" id="btn-popup">Google 팝업 로그인</button>
      <button type="button" id="btn-redirect">Google 리다이렉트 로그인</button>
      <button type="button" id="btn-out">로그아웃</button>
      <button type="button" id="btn-refresh">currentUser 수동 출력</button>
    </div>
    <div id="log"></div>
    <script type="module" src="/src/auth-test-entry.ts"></script>
  </body>
</html>
